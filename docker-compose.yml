services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retailstart}
      POSTGRES_USER: ${POSTGRES_USER:-retailstart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retailstart}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data_lake:/data_lake
      - ./data_sources:/data_sources:ro
      - staticfiles:/app/staticfiles
    command:
      - sh
      - -c
      - |
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        echo "" &&
        echo "========================================" &&
        echo "RetailStart — abrí en el navegador:" &&
        echo "  http://127.0.0.1:8080/" &&
        echo "(Nginx expone 8080; Gunicorn :8000 es solo interno.)" &&
        echo "========================================" &&
        echo "" &&
        gunicorn retailstart.wsgi:application --bind 0.0.0.0:8000
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/staticfiles:ro

volumes:
  postgres_data:
  staticfiles:
