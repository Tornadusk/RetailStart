{% load static %}
<div class="siteSidebar__backdrop" id="site-sidebar-backdrop" hidden></div>

<aside class="siteSidebar bg-mars-sidebar border-r border-mars-border text-mars-textMuted flex flex-col h-full overflow-y-auto shadow-[12px_0_40px_rgba(0,0,0,0.35)]" id="site-sidebar" aria-label="Menú lateral">
  
  <!-- 1. Cabecera del Menú -->
  <div class="siteSidebar__head border-b border-mars-border flex items-center justify-between pb-4" style="padding-top: 18px; padding-left: 20px; padding-right: 16px;">
    <span class="siteSidebar__brand text-mars-accent font-bold tracking-wide text-lg uppercase">RETAILSTART</span>
    <button type="button" id="site-nav-switch-to-navbar" class="flex items-center justify-center w-8 h-8 rounded-md border border-[rgba(192,132,252,0.45)] bg-[#121b2f] hover:border-[rgba(192,132,252,0.75)] transition-colors text-[#94a3b8] hover:text-white shadow-sm" aria-label="Cerrar menú y volver a franja" title="Cambiar a Franja Superior">
      <i class="fa-solid fa-xmark text-sm"></i>
    </button>
  </div>

  <!-- 2. Opciones de Navegación -->
  <nav class="siteSidebar__nav p-4 space-y-1.5">
    <a href="{% url 'home' %}" class="flex items-center px-3 py-2.5 transition-colors group {% if request.resolver_match.url_name == 'home' %}bg-[#3a1d24] rounded-lg text-mars-accent{% else %}bg-transparent rounded-lg hover:bg-white dark:bg-[#2d1a24]/5 text-mars-textMuted{% endif %}" {% if request.resolver_match.url_name == 'home' %}aria-current="page"{% endif %}>
      <i class="fa-solid fa-house w-6 text-center mr-2 {% if request.resolver_match.url_name != 'home' %}group-hover:text-mars-secondary{% endif %}"></i>
      <span class="font-medium">Inicio</span>
    </a>
    
    <a href="{% url 'dashboard' %}" class="flex items-center px-3 py-2.5 transition-colors group {% if request.resolver_match.url_name == 'dashboard' %}bg-[#3a1d24] rounded-lg text-mars-accent{% else %}bg-transparent rounded-lg hover:bg-white dark:bg-[#2d1a24]/5 text-mars-textMuted{% endif %}" {% if request.resolver_match.url_name == 'dashboard' %}aria-current="page"{% endif %}>
      <i class="fa-solid fa-chart-line w-6 text-center mr-2 {% if request.resolver_match.url_name != 'dashboard' %}group-hover:text-mars-secondary{% endif %}"></i>
      <span class="font-medium">Dashboard</span>
    </a>
    
    <a href="{% url 'flow' %}" class="flex items-center px-3 py-2.5 transition-colors group {% if request.resolver_match.url_name == 'flow' %}bg-[#3a1d24] rounded-lg text-mars-accent{% else %}bg-transparent rounded-lg hover:bg-white dark:bg-[#2d1a24]/5 text-mars-textMuted{% endif %}" {% if request.resolver_match.url_name == 'flow' %}aria-current="page"{% endif %}>
      <i class="fa-solid fa-arrows-turn-right w-6 text-center mr-2 {% if request.resolver_match.url_name != 'flow' %}group-hover:text-mars-secondary{% endif %}"></i>
      <span class="font-medium">Flujo</span>
    </a>
    
    <a href="{% url 'analytics' %}" class="flex items-center px-3 py-2.5 transition-colors group {% if request.resolver_match.url_name == 'analytics' %}bg-[#3a1d24] rounded-lg text-mars-accent{% else %}bg-transparent rounded-lg hover:bg-white dark:bg-[#2d1a24]/5 text-mars-textMuted{% endif %}" {% if request.resolver_match.url_name == 'analytics' %}aria-current="page"{% endif %}>
      <i class="fa-solid fa-magnifying-glass-chart w-6 text-center mr-2 {% if request.resolver_match.url_name != 'analytics' %}group-hover:text-mars-secondary{% endif %}"></i>
      <span class="font-medium">Analytics</span>
    </a>
    
    <a href="{% url 'evidence' %}" class="flex items-center px-3 py-2.5 transition-colors group {% if request.resolver_match.url_name == 'evidence' or request.resolver_match.url_name == 'evidence_file' %}bg-[#3a1d24] rounded-lg text-mars-accent{% else %}bg-transparent rounded-lg hover:bg-white dark:bg-[#2d1a24]/5 text-mars-textMuted{% endif %}" {% if request.resolver_match.url_name == 'evidence' or request.resolver_match.url_name == 'evidence_file' %}aria-current="page"{% endif %}>
      <i class="fa-solid fa-file-contract w-6 text-center mr-2 {% if request.resolver_match.url_name != 'evidence' and request.resolver_match.url_name != 'evidence_file' %}group-hover:text-mars-secondary{% endif %}"></i>
      <span class="font-medium">Evidencia</span>
    </a>
  </nav>

  <!-- 3. Filtro Global -->
  <section class="siteSidebar__panel border-t border-mars-border p-4" id="site-global-filters" aria-labelledby="site-global-filters-title">
    <h2 class="uppercase text-xs font-bold text-mars-textMuted mb-4 tracking-wider" id="site-global-filters-title">Filtro global</h2>
    <form class="siteSidebar__filterForm" id="site-filter-form" action="#" method="get">
      <div class="mb-3 flex flex-col">
        <label for="site-filter-y" class="text-xs text-mars-textMuted mb-1">Año</label>
        <select id="site-filter-y" name="y" class="siteSidebar__input bg-mars-surface border border-mars-border text-white rounded-md px-2 py-1.5 text-sm focus:border-mars-accent focus:outline-none transition-colors w-full">
          <option value="">Todos</option>
          {% for yr in sidebar_years %}
            <option value="{{ yr }}">{{ yr }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3 flex flex-col">
        <label for="site-filter-m" class="text-xs text-mars-textMuted mb-1">Mes</label>
        <select id="site-filter-m" name="m" class="siteSidebar__input bg-mars-surface border border-mars-border text-white rounded-md px-2 py-1.5 text-sm focus:border-mars-accent focus:outline-none transition-colors w-full">
          <option value="">Todos</option>
          {% for mo, mo_label in sidebar_months %}
            <option value="{{ mo }}">{{ mo_label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-5 flex flex-col">
        <label for="site-filter-d" class="text-xs text-mars-textMuted mb-1">Día</label>
        <select id="site-filter-d" name="d" class="siteSidebar__input bg-mars-surface border border-mars-border text-white rounded-md px-2 py-1.5 text-sm focus:border-mars-accent focus:outline-none transition-colors w-full">
          {% for val, label in sidebar_dias %}
            <option value="{{ val }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="flex space-x-2">
        <button type="submit" class="bg-mars-surface border border-mars-border text-white rounded-md px-3 py-1.5 text-sm hover:border-mars-accent transition-colors flex-1">Aplicar</button>
        <button type="button" class="bg-transparent text-mars-textMuted hover:text-white rounded-md px-3 py-1.5 text-sm transition-colors flex-1 text-center" id="site-filter-clear">Todos</button>
      </div>
    </form>
  </section>

  <!-- Modelo estrella -->
  <section class="siteSidebar__panel border-t border-mars-border p-4 mt-auto mb-4" aria-labelledby="site-model-view-title">
    <h2 class="uppercase text-xs font-bold text-mars-textMuted mb-3 tracking-wider" id="site-model-view-title">Modelo estrella</h2>
    <div class="siteSidebar__modelTabs flex flex-col space-y-1.5" role="group" aria-label="Vista del modelo en Analytics">
      <button type="button" class="siteSidebar__modelBtn js-site-model-view is-active bg-mars-surface border border-mars-border text-white px-2 py-1.5 text-sm rounded-md hover:border-mars-accent transition-colors text-left" data-analytics-view="todas" aria-pressed="true">Todas</button>
      <button type="button" class="siteSidebar__modelBtn js-site-model-view bg-transparent border border-transparent text-mars-textMuted px-2 py-1.5 text-sm rounded-md hover:bg-white dark:bg-[#2d1a24]/5 hover:text-white transition-colors text-left" data-analytics-view="hechos" aria-pressed="false">Hechos</button>
      <button type="button" class="siteSidebar__modelBtn js-site-model-view bg-transparent border border-transparent text-mars-textMuted px-2 py-1.5 text-sm rounded-md hover:bg-white dark:bg-[#2d1a24]/5 hover:text-white transition-colors text-left" data-analytics-view="dimensiones" aria-pressed="false">Dimensiones</button>
      <button type="button" class="siteSidebar__modelBtn js-site-model-view bg-transparent border border-transparent text-mars-textMuted px-2 py-1.5 text-sm rounded-md hover:bg-white dark:bg-[#2d1a24]/5 hover:text-white transition-colors text-left" data-analytics-view="tiempo" aria-pressed="false">Tiempo</button>
    </div>
  </section>
</aside>
