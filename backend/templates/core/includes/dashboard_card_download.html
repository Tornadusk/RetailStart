{% comment %}
  Descarga por tarjeta: PNG del canvas Chart.js (cliente) + CSV/HTML/PDF de la tabla (servidor ?panel=).
{% endcomment %}
<details class="dashboardDownload dashboardDownload--card">
  <summary class="btn btn--inline dashboardDownload__summary dashboardDownload__summary--sm">Descargar ▾</summary>
  <div class="dashboardDownload__menu">
    <button
      type="button"
      class="dashboardDownload__item dashboardDownload__item--btn js-dashboard-chart-png"
      data-chart-canvas="{{ chart_canvas_id }}"
      data-download-filename="{{ png_filename }}"
    >
      PNG (gráfico)
    </button>
    <a
      class="dashboardDownload__item"
      href="{% url 'dashboard_export' 'csv' %}?panel={{ export_panel }}{% if export_querystring %}&{{ export_querystring }}{% endif %}"
      >CSV (tabla)</a>
    <a
      class="dashboardDownload__item"
      href="{% url 'dashboard_export' 'html' %}?panel={{ export_panel }}{% if export_querystring %}&{{ export_querystring }}{% endif %}"
      >HTML (tabla)</a>
    <a
      class="dashboardDownload__item"
      href="{% url 'dashboard_export' 'pdf' %}?panel={{ export_panel }}{% if export_querystring %}&{{ export_querystring }}{% endif %}"
      target="_blank"
      rel="noopener noreferrer"
      >PDF / imprimir (tabla)</a>
  </div>
</details>
